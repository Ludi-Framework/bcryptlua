name: Build binary rocks

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        lua: ["5.4", "5.5", "luajit"]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: leafo/gh-actions-lua@v13
        with:
          luaVersion: ${{ matrix.lua }}

      - uses: leafo/gh-actions-luarocks@v5
        with:
          luarocksVersion: "3.13.0"

      - name: Install rust-mlua build backend
        run: luarocks install luarocks-build-rust-mlua

      # On a tag, stamp its version into the dev rockspec so the packed
      # rock is named after the release instead of "dev-1".
      - name: Select rockspec
        run: |
          ROCKSPEC=bcryptlua-dev-1.rockspec
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#v}-1"
            sed -e "s/^version = \"dev-1\"/version = \"$VERSION\"/" \
                -e "s|^\(   url = .*\)\$|\1,\n   tag = \"$GITHUB_REF_NAME\"|" \
                bcryptlua-dev-1.rockspec > "bcryptlua-$VERSION.rockspec"
            ROCKSPEC="bcryptlua-$VERSION.rockspec"
          fi
          echo "ROCKSPEC=$ROCKSPEC" >> "$GITHUB_ENV"

      - name: Build binary rock
        run: luarocks make --pack-binary-rock "$ROCKSPEC"

      # Rocks for different Lua versions share a filename (the .rock name
      # only encodes the platform), so they would overwrite each other in
      # the GitHub release. Suffix the variant; rename it back to the
      # canonical name before feeding it to luarocks install.
      - name: Add the Lua variant to the rock filename
        run: |
          case "${{ matrix.lua }}" in
            luajit*) SUFFIX="${{ matrix.lua }}" ;;
            *) SUFFIX="lua${{ matrix.lua }}" ;;
          esac
          for rock in *.rock; do
            mv "$rock" "${rock%.rock}-$SUFFIX.rock"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: rock-${{ matrix.os }}-lua${{ matrix.lua }}
          path: "*.rock"

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: "*.rock"

  luarocks:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    # LUAROCKS_API_KEY lives in the Production environment's secrets.
    environment: Production
    steps:
      - uses: actions/checkout@v4

      - uses: leafo/gh-actions-lua@v13
        with:
          luaVersion: "5.5"

      - uses: leafo/gh-actions-luarocks@v5
        with:
          luarocksVersion: "3.13.0"

      # luarocks upload needs a JSON library to talk to the luarocks.org API.
      - run: luarocks install dkjson

      # The dev rockspec is the single source of truth: stamp the tag's
      # version into it instead of committing one rockspec per release.
      - name: Generate versioned rockspec
        run: |
          VERSION="${GITHUB_REF_NAME#v}-1"
          sed -e "s/^version = \"dev-1\"/version = \"$VERSION\"/" \
              -e "s|^\(   url = .*\)\$|\1,\n   tag = \"$GITHUB_REF_NAME\"|" \
              bcryptlua-dev-1.rockspec > "bcryptlua-$VERSION.rockspec"
          echo "ROCKSPEC=bcryptlua-$VERSION.rockspec" >> "$GITHUB_ENV"
          cat "bcryptlua-$VERSION.rockspec"

      # --force makes re-runs idempotent: re-uploading the same version
      # overwrites it instead of failing.
      - name: Upload to luarocks.org
        run: luarocks upload "$ROCKSPEC" --force --api-key "${{ secrets.LUAROCKS_API_KEY }}"
